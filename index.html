<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柔云纸巾 — 柔软如云，呵护每寸肌肤</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fdfdfb; --fg: #2c2416; --accent: #e8734a; --accent2: #f4a460;
    --soft-blue: #dceefb; --soft-pink: #fce4ec; --soft-green: #e8f5e9;
    --card: #fff; --border: #e8e2d9; --muted: #8b7e6e;
    --radius: 16px; --shadow-sm: 0 2px 12px rgba(0,0,0,.06);
    --shadow: 0 8px 40px rgba(0,0,0,.08);
    --font: "Segoe UI", system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    scroll-behavior: smooth;
  }
  body { background: var(--bg); color: var(--fg); font-family: var(--font); line-height: 1.7; overflow-x: hidden; }

  /* ── Nav ── */
  nav {
    position: fixed; inset: 0 0 auto 0; z-index: 100;
    backdrop-filter: blur(12px); background: rgba(253,253,251,.85);
    border-bottom: 1px solid var(--border); transition: all .3s;
  }
  nav .inner { max-width: 1160px; margin: 0 auto; padding: 13px 20px; display: flex; align-items: center; justify-content: space-between; }
  nav .logo { font-weight: 800; font-size: 1.2rem; color: var(--accent); display: flex; align-items: center; gap: 7px; }
  nav .logo span { font-size: 1.5rem; }
  nav .links { display: flex; gap: 28px; list-style: none; align-items: center; }
  nav .links a { color: #5c5040; text-decoration: none; font-size: .88rem; font-weight: 500; transition: color .2s; }
  nav .links a:hover { color: var(--accent); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 24px; border-radius: 999px; font-size: .9rem; font-weight: 600; cursor: pointer; border: none; transition: all .25s; text-decoration: none; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 20px rgba(232,115,74,.3); }
  .btn-primary:hover { background: #d96340; transform: translateY(-2px); box-shadow: 0 6px 28px rgba(232,115,74,.45); }
  .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
  .btn-outline:hover { background: var(--accent); color: #fff; }

  /* ── Hero ── */
  .hero {
    min-height: 100vh; display: flex; align-items: center;
    padding: 100px 20px 60px;
    background: linear-gradient(160deg, #fef9f0 0%, #fdf5f5 30%, #f5f8fb 60%, #fefdf8 100%);
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ""; position: absolute; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(232,115,74,.08) 0%, transparent 70%);
    top: -80px; right: -100px; border-radius: 50%;
  }
  .hero::after {
    content: ""; position: absolute; width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(244,164,96,.06) 0%, transparent 70%);
    bottom: -60px; left: -80px; border-radius: 50%;
  }
  .hero .container { max-width: 1160px; margin: 0 auto; display: flex; align-items: center; gap: 60px; flex-wrap: wrap; position: relative; z-index: 1; }
  .hero .text { flex: 1; min-width: 280px; }
  .hero .text .badge { display: inline-block; padding: 6px 16px; border-radius: 999px; font-size: .78rem;
    font-weight: 600; background: rgba(232,115,74,.1); color: var(--accent); margin-bottom: 16px; letter-spacing: .04em; }
  .hero .text h1 { font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 800; line-height: 1.2; color: #2c2416; }
  .hero .text h1 em { font-style: normal; color: var(--accent); }
  .hero .text p { color: var(--muted); font-size: 1.08rem; margin-top: 14px; max-width: 460px; }
  .hero .text .cta-row { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; }
  /* tissue box CSS art */
  .hero .visual { position: relative; width: 280px; height: 320px; flex-shrink: 0; margin: 0 auto; }
  .tissue-box {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 180px; height: 140px; border-radius: 12px;
    background: linear-gradient(145deg, #fff 0%, #f7f3ee 50%, #f0e8dc 100%);
    box-shadow: 0 8px 36px rgba(0,0,0,.1), inset 0 1px 0 rgba(255,255,255,.8);
    border: 1px solid rgba(0,0,0,.06);
  }
  .tissue-box .opening {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 6px; background: #e0d5c5; border-radius: 3px;
    box-shadow: inset 0 -1px 0 rgba(0,0,0,.1);
  }
  .tissue-box .tissue-pop {
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    width: 70px; height: 40px; background: #fff;
    border-radius: 3px 3px 8px 8px;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    animation: tissueWave 2.5s ease-in-out infinite;
  }
  .tissue-box .tissue-pop2 {
    position: absolute; top: -12px; left: 52%; transform: translateX(-50%) rotate(6deg);
    width: 62px; height: 30px; background: #fefefe;
    border-radius: 3px 3px 6px 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
    animation: tissueWave 2.5s ease-in-out .4s infinite;
  }
  @keyframes tissueWave { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-6px); } }
  .hero .visual .decor { position: absolute; font-size: 2rem; opacity: .5; animation: float 3s ease-in-out infinite; }
  .hero .visual .decor:nth-child(1) { top: 20px; left: 10px; animation-delay: 0s; }
  .hero .visual .decor:nth-child(2) { top: 60px; right: 5px; animation-delay: .8s; }
  .hero .visual .decor:nth-child(3) { bottom: 140px; right: 30px; animation-delay: 1.6s; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  /* ── Sections ── */
  section { padding: 80px 20px; }
  .container { max-width: 1100px; margin: 0 auto; }
  .section-badge { display: inline-block; padding: 5px 16px; border-radius: 999px; font-size: .78rem;
    font-weight: 600; background: rgba(232,115,74,.1); color: var(--accent); margin-bottom: 12px; letter-spacing: .04em; }
  .section-title { font-size: clamp(1.6rem, 3.5vw, 2.4rem); font-weight: 700; margin-bottom: 10px; color: #2c2416; }
  .section-sub { color: var(--muted); font-size: 1.02rem; max-width: 560px; }

  /* ── Features ── */
  .features { background: #fefdfb; }
  .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 20px; margin-top: 42px; }
  .feat-card {
    background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 22px; text-align: center; transition: all .3s; box-shadow: var(--shadow-sm);
  }
  .feat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent); }
  .feat-card .icon { font-size: 2.4rem; margin-bottom: 12px; }
  .feat-card h3 { font-size: 1rem; margin-bottom: 6px; }
  .feat-card p { color: var(--muted); font-size: .88rem; }

  /* ── Products ── */
  .products { background: linear-gradient(180deg, #fefdfb 0%, #f7f3ec 100%); }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 26px; margin-top: 42px; }
  .product-card {
    background: #fff; border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow-sm); transition: all .3s; border: 1px solid var(--border);
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
  .product-card .img-box {
    height: 200px; display: flex; align-items: center; justify-content: center;
    font-size: 4.5rem; position: relative; overflow: hidden;
  }
  .p1 { background: linear-gradient(135deg, #fce4ec, #f8bbd0); }
  .p2 { background: linear-gradient(135deg, #dceefb, #bbdefb); }
  .p3 { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
  .p4 { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
  .product-card .info { padding: 20px; }
  .product-card .info h3 { font-size: 1.02rem; margin-bottom: 4px; }
  .product-card .info .spec { color: var(--muted); font-size: .84rem; margin-bottom: 10px; }
  .product-card .info .tag { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: .72rem;
    font-weight: 600; background: rgba(232,115,74,.1); color: var(--accent); }

  /* ── Why Us ── */
  .why-us { background: #fff; }
  .why-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap: 30px; margin-top: 42px; }
  .why-item { display: flex; gap: 16px; align-items: flex-start; }
  .why-item .n { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; font-size: .9rem; }
  .why-item h3 { font-size: 1rem; margin-bottom: 4px; }
  .why-item p { color: var(--muted); font-size: .88rem; }

  /* ── Stats bar ── */
  .stats-bar {
    background: linear-gradient(135deg, var(--accent), #d96340);
    padding: 48px 20px; color: #fff; text-align: center;
  }
  .stats-grid { display: flex; gap: 48px; justify-content: center; flex-wrap: wrap; }
  .stats-grid .stat .num { font-size: 2.4rem; font-weight: 800; }
  .stats-grid .stat .label { font-size: .88rem; opacity: .85; margin-top: 2px; }

  /* ── CTA ── */
  .cta-section { text-align: center; background: #fefdfb; }
  .cta-section .container { max-width: 600px; }

  /* ── Footer ── */
  footer { padding: 40px 20px; border-top: 1px solid var(--border); text-align: center; color: var(--muted); font-size: .84rem; background: #fefdfb; }
  footer .flinks { display: flex; gap: 22px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
  footer .flinks a { color: var(--muted); text-decoration: none; }
  footer .flinks a:hover { color: var(--accent); }

  /* ── Animations ── */
  .fade-up { opacity: 0; transform: translateY(24px); transition: all .6s cubic-bezier(.22,1,.36,1); }
  .fade-up.visible { opacity: 1; transform: translateY(0); }

  @media (max-width: 640px) {
    .hero .container { flex-direction: column-reverse; text-align: center; gap: 30px; }
    .hero .text p { margin: 14px auto 0; }
    .hero .text .cta-row { justify-content: center; }
    .hero .visual { width: 220px; height: 260px; }
    .tissue-box { width: 140px; height: 110px; }
    .tissue-box .opening { width: 60px; }
    .tissue-box .tissue-pop { width: 54px; height: 32px; top: -18px; }
    .tissue-box .tissue-pop2 { width: 48px; height: 24px; top: -10px; }
    nav .links { gap: 14px; }
  }
</style>
</head>

<script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
</script>
